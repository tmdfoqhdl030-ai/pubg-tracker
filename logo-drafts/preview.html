<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>m249 로고 예시안</title>
  <style>
    body {
      background: #1E293B;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      font-family: Arial, sans-serif;
      color: white;
      gap: 40px;
    }
    h1 { color: #F97316; font-size: 20px; margin-bottom: 0; }
    .logos {
      display: flex;
      gap: 60px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .label {
      font-size: 18px;
      font-weight: bold;
      color: #F97316;
    }
    .desc {
      font-size: 13px;
      color: #94A3B8;
      text-align: center;
      max-width: 180px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>🔫 m249.kr 로고 예시안 3가지</h1>

  <div class="logos">

    <!-- A안 -->
    <div class="logo-item">
      <div class="label">A안 — 심플 박스형</div>
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
        <rect width="200" height="200" rx="24" fill="#0D1117"/>
        <rect x="24" y="24" width="60" height="5" rx="2.5" fill="#F97316"/>
        <text x="100" y="118" font-family="Arial Black, sans-serif" font-size="54" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">m249</text>
        <text x="100" y="148" font-family="Arial, sans-serif" font-size="16" fill="#F97316" text-anchor="middle" letter-spacing="4">TRACKER</text>
      </svg>
      <div class="desc">검은 사각형 + 주황 포인트<br>심플하고 모던</div>
    </div>

    <!-- B안 -->
    <div class="logo-item">
      <div class="label">B안 — 조준경 원형</div>
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="100" fill="#0D1117"/>
        <circle cx="100" cy="100" r="72" fill="none" stroke="#F97316" stroke-width="2" opacity="0.4"/>
        <circle cx="100" cy="100" r="50" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
        <line x1="100" y1="28" x2="100" y2="60" stroke="#F97316" stroke-width="2" opacity="0.5"/>
        <line x1="100" y1="140" x2="100" y2="172" stroke="#F97316" stroke-width="2" opacity="0.5"/>
        <line x1="28" y1="100" x2="60" y2="100" stroke="#F97316" stroke-width="2" opacity="0.5"/>
        <line x1="140" y1="100" x2="172" y2="100" stroke="#F97316" stroke-width="2" opacity="0.5"/>
        <text x="100" y="112" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">m249</text>
      </svg>
      <div class="desc">원형 + 조준경 십자선<br>FPS 게임 느낌 강함</div>
    </div>

    <!-- C안 -->
    <div class="logo-item">
      <div class="label">C안 — 도그태그형</div>
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
        <rect width="200" height="200" rx="8" fill="#0D1117"/>
        <rect x="44" y="50" width="112" height="90" rx="16" fill="#1A2332" stroke="#2D3F55" stroke-width="1.5"/>
        <circle cx="100" cy="50" r="8" fill="#1A2332" stroke="#2D3F55" stroke-width="1.5"/>
        <text x="100" y="106" font-family="Arial Black, sans-serif" font-size="46" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">m249</text>
        <line x1="60" y1="118" x2="140" y2="118" stroke="#F97316" stroke-width="1.5" opacity="0.7"/>
        <text x="100" y="136" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle" letter-spacing="5">.KR</text>
        <text x="100" y="166" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="2">BATTLEGROUNDS</text>
      </svg>
      <div class="desc">군인 인식표 모양<br>밀리터리 감성</div>
    </div>

  </div>
</body>
</html>
